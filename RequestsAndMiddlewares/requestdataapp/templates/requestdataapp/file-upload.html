{% extends 'requestdataapp/base.html' %}

{% block title %}
  Upload file
{% endblock %}

{% block body %}
<h1>Upload file</h1>
<div>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
<button type="submit">Submit</button>
<input type="file" name="file" />
</form>
</div>
{% endblock %}
